PROJECT: "copytask_expectation"
DATASET:
  NAME: CopyMemory
  SENT_LENGTH: 10
  SEQ_LENGTH: 1000
  TEST_SIZE: 2000
  TRAIN_SIZE: 512000
  VAL_SIZE: 2000
  VOCABULARY: 10
MODEL:
  ALPHA_MIN: 4.0
  ALPHA_MAX: 6.0
  THETA_MIN: 0.5
  THETA_MAX: 2
  ACTIVATION: $torch.nn.GELU
  BIAS: True
  BIDIRECTIONAL: False
  DROPOUT: 0.
  ENCODING: embedding
  INPUT_SIZE: 128
  KERNEL_VERSION: gamma
  N_LAYERS: 6
  NAME: DSS
  NORMALIZATION: batch_norm
  POOLING: manytomany
  SEED: [712,8,93] #[712,8,93,74,812]
TRAIN:
  BATCH_SIZE: 50
  DISPLAY_EPOCH: True
  DISPLAY_EVERY: null
  LOSS_FN: $torch.nn.CrossEntropyLoss
  LOSS_CONFIG: null
  METRICS: null
  N_EPOCHS: 20
  OPTIMIZER: $torch.optim.AdamW
  OPTIMIZER_CONFIG:
    lr: [1.e-2]
    weight_decay: 1.e-2
  SCHEDULER: $torch.optim.lr_scheduler.StepLR
  SCHEDULER_CONFIG:
    gamma: 0.8
    step_size: 1
  TORCH_DEVICE: cpu
  USE_TQDM: False
  USE_WANDB: False